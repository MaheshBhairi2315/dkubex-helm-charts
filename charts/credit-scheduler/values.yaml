replicaCount: 1

image:
  repository: nginx
  tag: "latest"
  # TODO: Change to ghcr.io/dev-oc-sb/credit_scheduler:latest when GHCR access is fixed
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3600

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /app

nodeSelector: {}
tolerations: []
affinity: {}
