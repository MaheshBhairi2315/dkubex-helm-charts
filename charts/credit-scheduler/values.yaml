replicaCount: 1

image:
  repository: ghcr.io/dev-oc-sb/credit_scheduler
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3600

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /app

nodeSelector: {}
tolerations: []
affinity: {}
